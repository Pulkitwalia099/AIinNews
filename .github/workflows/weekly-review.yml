name: Weekly PM Review

on:
  schedule:
    - cron: '0 9 * * 6'  # Saturday 9:00 AM UTC
  workflow_dispatch:      # manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly PM review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPICVSCODE }}
          RESEND_API_KEY: ${{ secrets.RESENDKEYAINEWLETTER }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PM_SECRET: ${{ secrets.PM_SECRET }}
        run: python weekly_review.py

      - name: Commit review file to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reviews/
          git diff --staged --quiet || git commit -m "PM Review $(date +%Y-%m-%d)"
          git push
