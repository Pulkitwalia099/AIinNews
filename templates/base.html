<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI in News</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f9f9f7;
      color: #1a1a1a;
      line-height: 1.6;
    }

    header {
      border-bottom: 2px solid #1a1a1a;
      padding: 20px 0;
      margin-bottom: 40px;
    }

    .container { max-width: 800px; margin: 0 auto; padding: 0 20px; }

    header .container { display: flex; justify-content: space-between; align-items: center; }

    header h1 { font-size: 1.4rem; letter-spacing: 0.05em; text-transform: uppercase; }

    nav a { color: #1a1a1a; text-decoration: none; margin-left: 20px; font-size: 0.9rem; }
    nav a:hover { text-decoration: underline; }

    .date { font-size: 0.85rem; color: #666; margin-bottom: 40px; }

    .section-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #fff;
      background: #1a1a1a;
      padding: 3px 8px;
      border-radius: 3px;
      display: inline-block;
      margin-bottom: 20px;
      margin-top: 40px;
    }

    .article { border-bottom: 1px solid #e0e0e0; padding: 24px 0; }
    .article:last-child { border-bottom: none; }

    .article h2 { font-size: 1.1rem; margin-bottom: 6px; }
    .article h2 a { color: #1a1a1a; text-decoration: none; }
    .article h2 a:hover { text-decoration: underline; }

    .meta { font-size: 0.78rem; color: #888; margin-bottom: 10px; }

    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }

    .tag {
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 20px;
      border: 1px solid #ccc;
      color: #555;
    }

    .tag.maturity { background: #f0f0f0; }

    .summary { font-size: 0.92rem; color: #333; margin-bottom: 12px; }

    .so-what {
      background: #f0f4ff;
      border-left: 3px solid #4a6cf7;
      padding: 12px 16px;
      font-size: 0.88rem;
      border-radius: 0 4px 4px 0;
    }

    .so-what strong { display: block; font-size: 0.72rem; text-transform: uppercase;
      letter-spacing: 0.08em; color: #4a6cf7; margin-bottom: 4px; }

    footer { border-top: 1px solid #e0e0e0; padding: 30px 0; margin-top: 60px;
      font-size: 0.8rem; color: #999; text-align: center; }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1>AI in News</h1>
      <nav>
        <a href="/">Latest</a>
        <a href="/archive">Archive</a>
      </nav>
    </div>
  </header>

  <div class="container">
    {% block content %}{% endblock %}
  </div>

  <footer>
    <div class="container">
      Curated daily for founders · Powered by Claude
    </div>
  </footer>
</body>
</html>
